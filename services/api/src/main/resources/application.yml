server:
  port: 8080

spring:
  jackson:
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: jdbc:h2:mem:evlease;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  auth:
    fixed-code:
      enabled: false
      value: "123456"
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}
  admin:
    username: "admin"
    password: "admin123"
