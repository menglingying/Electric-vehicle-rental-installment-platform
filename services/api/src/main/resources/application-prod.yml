server:
  port: 8080

spring:
  jackson:
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: jdbc:mysql://mysql:3306/evlease?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  auth:
    fixed-code:
      enabled: false
      value: "123456"
      whitelist-phones: ${APP_AUTH_FIXED_CODE_WHITELIST_PHONES:}
  upload:
    dir: ${APP_UPLOAD_DIR:/app/uploads}
  admin:
    username: ${APP_ADMIN_USERNAME:admin}
    password: ${APP_ADMIN_PASSWORD:admin123}
