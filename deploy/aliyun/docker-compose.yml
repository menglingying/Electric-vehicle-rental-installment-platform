name: evlease

services:
  mysql:
    image: ${EVLEASE_MYSQL_IMAGE:-docker.m.daocloud.io/library/mysql:8.0}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in .env}
      MYSQL_DATABASE: evlease
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  api:
    image: ${EVLEASE_JRE_IMAGE:-docker.m.daocloud.io/library/eclipse-temurin:17-jre}
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set in .env}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-admin123}
      APP_AUTH_FIXED_CODE_WHITELIST_PHONES: ${APP_AUTH_FIXED_CODE_WHITELIST_PHONES:-}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL:-}
      APP_UPLOAD_DIR: ${APP_UPLOAD_DIR:-/app/uploads}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms128m -Xmx512m}
      JUZHENG_BASE_URL: ${JUZHENG_BASE_URL:-https://gz.51juzheng.cn}
      JUZHENG_CLIENT_ID: ${JUZHENG_CLIENT_ID:-}
      JUZHENG_CLIENT_SECRET: ${JUZHENG_CLIENT_SECRET:-}
      JUZHENG_PUBLIC_KEY: ${JUZHENG_PUBLIC_KEY:-}
      JUZHENG_PRIVATE_KEY: ${JUZHENG_PRIVATE_KEY:-}
      JUZHENG_COMPANY_NAME: ${JUZHENG_COMPANY_NAME:-}
      JUZHENG_COMPANY_CERT_NO: ${JUZHENG_COMPANY_CERT_NO:-}
      JUZHENG_COMPANY_ADDRESS: ${JUZHENG_COMPANY_ADDRESS:-}
      JUZHENG_LEGAL_NAME: ${JUZHENG_LEGAL_NAME:-}
      JUZHENG_LEGAL_CERT_NO: ${JUZHENG_LEGAL_CERT_NO:-}
      JUZHENG_LEGAL_PHONE: ${JUZHENG_LEGAL_PHONE:-}
      JUZHENG_COMPANY_TYPE: ${JUZHENG_COMPANY_TYPE:-30}
      JUZHENG_CALLBACK_URL: ${JUZHENG_CALLBACK_URL:-}
      ASIGN_BASE_URL: ${ASIGN_BASE_URL:-https://oapi.asign.cn}
      ASIGN_APP_ID: ${ASIGN_APP_ID:-}
      ASIGN_PRIVATE_KEY: ${ASIGN_PRIVATE_KEY:-}
      ASIGN_PUBLIC_KEY: ${ASIGN_PUBLIC_KEY:-}
      ASIGN_TEMPLATE_NO: ${ASIGN_TEMPLATE_NO:-}
      ASIGN_TEMPLATE_FILL_JSON: ${ASIGN_TEMPLATE_FILL_JSON:-}
      ASIGN_COMPANY_ACCOUNT: ${ASIGN_COMPANY_ACCOUNT:-}
      ASIGN_COMPANY_NAME: ${ASIGN_COMPANY_NAME:-}
      ASIGN_COMPANY_CERT_NO: ${ASIGN_COMPANY_CERT_NO:-}
      ASIGN_COMPANY_SERIAL_NO: ${ASIGN_COMPANY_SERIAL_NO:-}
      ASIGN_COMPANY_ADDRESS: ${ASIGN_COMPANY_ADDRESS:-}
      ASIGN_LEGAL_NAME: ${ASIGN_LEGAL_NAME:-}
      ASIGN_LEGAL_CERT_NO: ${ASIGN_LEGAL_CERT_NO:-}
      ASIGN_LEGAL_PHONE: ${ASIGN_LEGAL_PHONE:-}
      ASIGN_COMPANY_MOBILE: ${ASIGN_COMPANY_MOBILE:-}
      ASIGN_COMPANY_CONTACT_NAME: ${ASIGN_COMPANY_CONTACT_NAME:-}
      ASIGN_COMPANY_CONTACT_ID_CARD: ${ASIGN_COMPANY_CONTACT_ID_CARD:-}
      ASIGN_SIGN_ORDER: ${ASIGN_SIGN_ORDER:-1}
      ASIGN_COMPANY_SIGN_TYPE: ${ASIGN_COMPANY_SIGN_TYPE:-3}
      ASIGN_USER_SIGN_TYPE: ${ASIGN_USER_SIGN_TYPE:-3}
      ASIGN_COMPANY_SIGN_KEY: ${ASIGN_COMPANY_SIGN_KEY:-}
      ASIGN_USER_SIGN_KEY: ${ASIGN_USER_SIGN_KEY:-}
      ASIGN_COMPANY_SIGN_STRATEGY_JSON: ${ASIGN_COMPANY_SIGN_STRATEGY_JSON:-}
      ASIGN_USER_SIGN_STRATEGY_JSON: ${ASIGN_USER_SIGN_STRATEGY_JSON:-}
      ASIGN_NOTIFY_URL: ${ASIGN_NOTIFY_URL:-}
      ASIGN_CALLBACK_URL: ${ASIGN_CALLBACK_URL:-}
      ASIGN_USER_NOTIFY_URL: ${ASIGN_USER_NOTIFY_URL:-}
      ASIGN_REDIRECT_URL: ${ASIGN_REDIRECT_URL:-}
      ASIGN_USE_STRANGER: ${ASIGN_USE_STRANGER:-false}
      ASIGN_SIGN_ATTACH_NO: ${ASIGN_SIGN_ATTACH_NO:-1}
      ASIGN_SIGN_LOCATION_MODE: ${ASIGN_SIGN_LOCATION_MODE:-4}
    volumes:
      - ./artifacts/installment-api.jar:/app/app.jar:ro
      - ./data/uploads:/app/uploads
    command: ["java", "-jar", "/app/app.jar"]
    restart: unless-stopped

  h5:
    image: ${EVLEASE_NGINX_IMAGE:-docker.m.daocloud.io/library/nginx:1.25-alpine}
    depends_on:
      - api
    ports:
      - "8088:80"
    volumes:
      - ./nginx/h5.conf:/etc/nginx/conf.d/default.conf:ro
      - ./artifacts/h5:/usr/share/nginx/html:ro
    restart: unless-stopped

  admin:
    image: ${EVLEASE_NGINX_IMAGE:-docker.m.daocloud.io/library/nginx:1.25-alpine}
    depends_on:
      - api
    ports:
      - "8089:80"
    volumes:
      - ./nginx/admin.conf:/etc/nginx/conf.d/default.conf:ro
      - ./artifacts/admin:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  mysql_data:
